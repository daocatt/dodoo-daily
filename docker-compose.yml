services:
  dodoo-daily:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    
    volumes:
      # [1] SQLite Database persistence
      - /volume1/docker/dodoo-daily/database:/app/database
      
      # [2] Media uploads (images, voices, etc)
      - /volume1/docker/dodoo-daily/uploads:/app/uploads
      
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/system/settings"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
